<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Poppins:wght@600&amp;display=swap');
    </style>

    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#E5E7EB" />
    </pattern>

    <linearGradient id="hub-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>

    <filter id="shadow-md" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#111827" flood-opacity="0.08" />
    </filter>

    <filter id="shadow-lg" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#111827" flood-opacity="0.1" />
    </filter>

    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#2563EB" />
    </marker>

    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#10B981" />
    </marker>
  </defs>

  <rect width="800" height="600" fill="#F9FAFB" />
  <rect width="800" height="600" fill="url(#dots)" />

  <g id="header">
    <text x="400" y="60" font-family="'Poppins', sans-serif" font-weight="600" font-size="28" fill="#111827" text-anchor="middle">Step 2: Configure &amp; Integrate</text>
    <text x="400" y="95" font-family="'Inter', sans-serif" font-weight="400" font-size="16" fill="#6B7280" text-anchor="middle">Connect your data sources, configure AI models, and deploy securely.</text>
  </g>

  <path d="M 200 300 L 245 300" fill="none" stroke="#2563EB" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrow-blue)" />
  <path d="M 555 300 L 600 300" fill="none" stroke="#10B981" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrow-green)" />

  <g id="input-card" transform="translate(60, 220)">
    <rect x="0" y="0" width="140" height="160" rx="16" fill="#FFFFFF" filter="url(#shadow-md)" />
    <rect x="30" y="20" width="80" height="80" rx="12" fill="#F3F4F6" />
    <rect x="45" y="35" width="50" height="10" rx="4" fill="#2563EB" opacity="0.8" />
    <rect x="45" y="55" width="35" height="10" rx="4" fill="#2563EB" opacity="0.5" />
    <rect x="45" y="75" width="45" height="10" rx="4" fill="#2563EB" opacity="0.3" />
    <text x="70" y="125" font-family="'Inter', sans-serif" font-weight="500" font-size="14" fill="#111827" text-anchor="middle">Your Data</text>
    <text x="70" y="145" font-family="'Inter', sans-serif" font-weight="400" font-size="12" fill="#6B7280" text-anchor="middle">CRM, ERP, Docs</text>
  </g>

  <g id="output-card" transform="translate(600, 220)">
    <rect x="0" y="0" width="140" height="160" rx="16" fill="#FFFFFF" filter="url(#shadow-md)" />
    <circle cx="70" cy="60" r="30" fill="#F59E0B" opacity="0.15" />
    <path d="M 70 40 L 73 50 L 83 53 L 73 56 L 70 66 L 67 56 L 57 53 L 67 50 Z" fill="#F59E0B" />
    <circle cx="70" cy="70" r="15" fill="#2563EB" opacity="0.15" />
    <path d="M 58 65 A 12 12 0 0 0 70 77 L 70 82 L 76 77 A 12 12 0 0 0 82 65 Z" fill="#2563EB" />
    <text x="70" y="125" font-family="'Inter', sans-serif" font-weight="500" font-size="14" fill="#111827" text-anchor="middle">AI Output</text>
    <text x="70" y="145" font-family="'Inter', sans-serif" font-weight="400" font-size="12" fill="#6B7280" text-anchor="middle">Analytics, Chat</text>
  </g>

  <g id="hub-card" transform="translate(260, 140)">
    <rect x="0" y="0" width="280" height="320" rx="20" fill="#FFFFFF" filter="url(#shadow-lg)" />

    <path d="M 0 20 Q 0 0 20 0 L 260 0 Q 280 0 280 20 L 280 60 L 0 60 Z" fill="url(#hub-grad)" />
    <text x="140" y="38" font-family="'Poppins', sans-serif" font-weight="600" font-size="18" fill="#FFFFFF" text-anchor="middle">Integration Hub</text>

    <rect x="20" y="80" width="240" height="50" rx="10" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1" />
    <circle cx="40" cy="105" r="12" fill="#10B981" />
    <path d="M 35 105 L 38 108 L 45 101" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <text x="65" y="102" font-family="'Inter', sans-serif" font-weight="500" font-size="14" fill="#111827">Salesforce CRM</text>
    <text x="65" y="118" font-family="'Inter', sans-serif" font-weight="400" font-size="11" fill="#6B7280">Connected · 12 fields mapped</text>

    <rect x="20" y="145" width="240" height="50" rx="10" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1" />
    <circle cx="40" cy="170" r="12" fill="#10B981" />
    <path d="M 35 170 L 38 173 L 45 166" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <text x="65" y="167" font-family="'Inter', sans-serif" font-weight="500" font-size="14" fill="#111827">Slack Workspace</text>
    <text x="65" y="183" font-family="'Inter', sans-serif" font-weight="400" font-size="11" fill="#6B7280">Active · 5 channels integrated</text>

    <rect x="20" y="210" width="240" height="50" rx="10" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1" />
    <circle cx="40" cy="235" r="12" fill="#F59E0B" />
    <circle cx="40" cy="235" r="4" fill="#FFFFFF" />
    <path d="M 40 225 A 10 10 0 0 0 40 245 M 30 235 A 10 10 0 0 0 50 235" fill="none" stroke="#FFFFFF" stroke-width="2" />
    <text x="65" y="232" font-family="'Inter', sans-serif" font-weight="500" font-size="14" fill="#111827">GPT-4 LLM</text>
    <text x="65" y="248" font-family="'Inter', sans-serif" font-weight="400" font-size="11" fill="#6B7280">Configured · Pending test</text>

    <rect x="100" y="275" width="80" height="30" rx="8" fill="#2563EB" />
    <text x="140" y="295" font-family="'Inter', sans-serif" font-weight="500" font-size="12" fill="#FFFFFF" text-anchor="middle">+ Add More</text>
  </g>
</svg>