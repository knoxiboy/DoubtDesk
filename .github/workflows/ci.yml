name: CI

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ─── Unit Tests ──────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test -- --passWithNoTests
        env:
          CI: true

  # ─── TypeScript ──────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  # ─── ESLint ──────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx eslint . --ext .ts,.tsx --max-warnings=20

  # ─── Build ───────────────────────────────────────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'pull_request'
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_ZHVtbXkuY2xlcmsuYWNjb3VudHMuZGV2JA' }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'sk_test_placeholder' }}
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://user:password@localhost.neon.tech/testdb?sslmode=require' }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'placeholder' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build Next.js app
        run: npm run build

  # ─── Security Scan ──────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for security issues
        id: scan
        run: |
          FOUND_ISSUES=0
          if git diff origin/main...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' | grep "^+" | grep -v "^+++" | grep -iE "(password|secret|api_key|apikey|token)\s*=\s*['\"][^'\"]{8,}" ; then
            echo "::error title=Security Issue::Possible hardcoded secret detected"
            FOUND_ISSUES=1
          fi
          if git diff origin/main...HEAD | grep "^+" | grep -v "^+++" | grep -iE "NEXT_PUBLIC_(DATABASE_URL|SECRET|PASSWORD|PRIVATE)" ; then
            echo "::error title=Security Issue::Sensitive variable exposed via NEXT_PUBLIC_ prefix"
            FOUND_ISSUES=1
          fi
          if git diff origin/main...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' | grep "^+" | grep -v "^+++" | grep -iE "console\.(log|error)\(.*?(password|token|secret|key)" ; then
            echo "::error title=Security Issue::Possible sensitive data in console output"
            FOUND_ISSUES=1
          fi
          if [ $FOUND_ISSUES -eq 1 ]; then
            echo "Security issues found. Failing the build."
            exit 1
          fi

  # ─── PR Quality Gate ─────────────────────────────────────────────────────────
  pr-quality:
    name: PR Quality Gate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR quality (idempotent)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title || '';
            const body = pr.body || '';
            const issues = [];

            // 1. Title format
            const prefixes = ['feat', 'fix', 'docs', 'style', 'refactor', 'test', 'chore', 'perf', 'ci', 'build', 'revert'];
            if (!prefixes.some(p => title.toLowerCase().startsWith(p))) {
              issues.push(`**Title format**: Should start with a conventional commit prefix (e.g. \`feat:\`, \`fix:\`). Current: \`${title}\``);
            }

            // 2. Description length
            if (body.trim().length < 50) {
              issues.push('**Description**: PR description is too short. Please describe what changes were made and why.');
            }

            // 3. Linked issue
            if (!/closes?\s+#\d+|fixes?\s+#\d+|resolves?\s+#\d+/i.test(body)) {
              issues.push('**Linked Issue**: No linked issue found. Please add `Closes #<issue-number>` to your PR description.');
            }

            // 4. Testing mention
            if (!/test|spec|jest|vitest|playwright/i.test(body)) {
              issues.push('**Testing**: No mention of tests. Please describe how you tested your changes.');
            }

            if (issues.length > 0) {
              issues.forEach(issue => core.warning(issue));
            } else {
              console.log('PR passed all quality checks');
            }

  # ─── Dependency Audit ────────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Check for new dependencies
        run: git diff origin/main...HEAD -- package.json | grep "^+" | grep -v "^+++" | grep -E '"[^"]+"\s*:\s*"' || echo "No new dependencies"
      - name: Audit high severity
        run: npm audit --audit-level=high
        continue-on-error: true

  # ─── Migration Check ─────────────────────────────────────────────────────────
  migration-check:
    name: Migration Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx drizzle-kit generate
      - name: Check for uncommitted migrations
        run: git diff --exit-code drizzle/
